<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produkt</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <a href="index.html">
        <img src="img/logo_icons/logo_sport4u.svg" alt=""
      /></a>
      <img class="basket_icon" src="img/logo_icons/shopping-cart.svg" alt="" />
    </header>
    <main>
      <a href="produktliste.html"
        ><img class="arrow_back" src="img/logo_icons/arrow-left.svg" alt=""
      /></a>

      <section class="produkt_grid">
        <div>
          <img src="img/produkter/hans-sunglasses-1271915_640.jpg" alt="" />
        </div>
        <div class="produkt_info">
          <h2>Hurtig brille</h2>
          <p class="produkt-pris">200 DKK</p>
          <p class="produkt_text">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Consectetur
            ipsa eaque nesciunt libero a tempora ab tempore ducimus explicabo
            autem cumque cum, soluta odio aut, minima modi esse molestias sunt!
          </p>
          <img
            class="add_to_cart"
            src="img/logo_icons/shopping-cart-add.svg"
            alt=""
          />
          <div class="accordion">
            <button class="accordion-btn">Produktbeskrivelse</button>
            <div class="accordion-content">
              <p>Her står produktbeskrivelsen...</p>
            </div>
          </div>

          <div class="accordion">
            <button class="accordion-btn">Specifikationer</button>
            <div class="accordion-content">
              <p>Materiale, mål osv...</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <img src="img/logo_icons/logo_sport4u.svg" alt="" />
    </footer>
    <script src="main.js"></script>
  </body>
</html>
